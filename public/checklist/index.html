<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checklist de Inspección — Higiene y Seguridad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Suprimir advertencia de desarrollo
      const originalConsoleError = console.error;
      console.error = function (...args) {
        if (
          args[0] &&
          args[0].includes &&
          args[0].includes("cdn.tailwindcss.com")
        ) {
          return; // Ignorar la advertencia de Tailwind
        }
        originalConsoleError.apply(console, args);
      };
    </script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
      .checklist-item-yes {
        @apply bg-green-100 border-green-300;
      }
      .checklist-item-no {
        @apply bg-red-100 border-red-300;
      }
      .checklist-item-pending {
        @apply bg-yellow-100 border-yellow-300;
      }
    </style>
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const ChecklistApp = () => {
        const [activeTab, setActiveTab] = useState("client-info");
        const [selectedChecklist, setSelectedChecklist] = useState("general");
        const [clientData, setClientData] = useState({
          company: "",
          cuit: "",
          address: "",
          phone: "",
          email: "",
          sector: "",
          workers: "",
          visitDate: new Date().toISOString().split("T")[0],
          inspector: "",
        });

        const [checklistItems, setChecklistItems] = useState({});
        const [observations, setObservations] = useState("");

        const checklists = {
          general: {
            name: "Checklist General de Inspección",
            items: [
              "Señalización de seguridad adecuada y visible",
              "Salidas de emergencia libres y señalizadas",
              "Extintores presentes, señalizados y vigentes",
              "Iluminación adecuada en todos los sectores",
              "Orden y limpieza en el área de trabajo",
              "Residuos y desechos correctamente gestionados",
              "Equipos y herramientas en buen estado",
              "Uso de EPP adecuado por parte del personal",
              "Máquinas con protecciones y resguardos",
              "Ventilación adecuada en los ambientes",
              "Productos químicos correctamente almacenados y etiquetados",
              "Cableado eléctrico en buen estado y protegido",
              "Pisos y superficies sin riesgos de resbalones o tropiezos",
              "Carga de fuego dentro de los límites permitidos",
              "Condiciones de ergonomía adecuadas",
              "Capacitación y entrenamiento del personal vigente",
              "Procedimientos de trabajo seguro establecidos y conocidos",
              "Primeros auxilios disponibles y accesibles",
              "Plan de emergencia visible y conocido",
              "Documentación legal de Higiene y Seguridad al día",
            ],
          },
          offices: {
            name: "Checklist de Oficinas",
            items: [
              "Las áreas de trabajo están limpias, ordenadas y libres de obstáculos",
              "Los pasillos y salidas de emergencia están despejados y señalizados",
              "Iluminación adecuada en todos los puestos de trabajo",
              "Ventilación e ingreso de aire natural adecuado",
              "Temperatura ambiental confortable",
              "Ruido ambiental dentro de niveles aceptables",
              "Ergonomía adecuada en sillas, escritorios y monitores",
              "Monitores a la altura de los ojos y a distancia adecuada",
              "Teclados y mouse en posición ergonómica",
              "Espacios de trabajo con suficiente amplitud",
              "Cables eléctricos ordenados y sin riesgos de tropiezo",
              "Conexiones eléctricas seguras y en buen estado",
              "Equipos eléctricos y electrónicos en buen estado",
              "Uso de regletas y zapatillas con protección",
              "Extintores accesibles, vigentes y señalizados",
              "Detectores de humo / incendio en funcionamiento (si aplica)",
              "Botiquín de primeros auxilios disponible y completo",
              "Cartelería de seguridad y emergencia visible",
              "Gestión adecuada de residuos (papel, plásticos, etc.)",
              "Productos de limpieza y sustancias químicas almacenados correctamente",
            ],
          },
          machinery: {
            name: "Checklist de Máquinas y Herramientas",
            items: [
              "Las máquinas cuentan con resguardos y protecciones",
              "Resguardos en buen estado y correctamente instalados",
              "Dispositivos de seguridad operativos (frenos, paradas de emergencia)",
              "Parada de emergencia accesible y funcionando",
              "Señalización de advertencia y uso visible en las máquinas",
              "Las máquinas cuentan con manual de uso y mantenimiento",
              "Máquinas adecuadas al trabajo a realizar",
              "Uso correcto de máquinas por personal capacitado",
              "Herramientas manuales en buen estado",
              "Herramientas eléctricas con cable y conexiones seguras",
              "Herramientas sin daños, roturas o desgaste excesivos",
              "Las herramientas se usan para el fin indicado",
              "Mantenimiento preventivo realizado en tiempo y forma",
              "Registros de mantenimiento disponibles y actualizados",
              "Área alrededor de las máquinas limpia y ordenada",
              "No hay obstáculos que impidan el uso seguro",
              "Iluminación adecuada en el área de máquinas",
              "Riesgos asociados identificados y controlados",
              "Uso obligatorio de EPP específico para cada máquina",
              "Se cumplen los procedimientos de trabajo seguro",
            ],
          },
          electrical: {
            name: "Checklist de Instalaciones Eléctricas",
            items: [
              "Tableros eléctricos identificados y con acceso libre",
              "Señalización de riesgo eléctrico presente y visible",
              "Interruptores termomagnéticos en buen estado y operativos",
              "Interruptores diferenciales (IDR) instalados y operativos",
              "Puesta a tierra existente y correctamente conectada",
              "Continuidad de la puesta a tierra verificada",
              "Cables y conductores en estado, sin daños",
              "Canalizaciones y bandejas en buen estado y fijadas",
              "Conexiones eléctricas firmes y seguras",
              "Cajas de conexiones con tapa de protección",
              "Tomacorrientes accesibles, vigentes y protegidos",
              "Uso de alargues / prolongadores adecuado y temporal",
              "Enchufes y tomacorrientes sin daños, roturas o desgaste",
              "Equipos eléctricos con cable aislado y conexión segura",
              "Equipos eléctricos con mantenimiento al día",
              "Iluminación adecuada en todos los sectores",
              "Luminarias protegidas y en buen estado",
              "No hay sobrecargas en circuitos",
              "Documentación eléctrica disponible y actualizada",
              "Personal capacitado para trabajos eléctricos si es necesario",
            ],
          },
          fire: {
            name: "Checklist de Incendio",
            items: [
              "Extintores presentes, señalizados y vigentes",
              "Extintores con carga y precinto de seguridad",
              "Extintores ubicados en lugares visibles y accesibles",
              "Se respeta la distancia máxima de recorrido a extintores",
              "Hidrantes operativos y con acceso despejado",
              "Mangueras en buen estado y correctamente enrolladas",
              "Válvulas de hidrantes en buen estado",
              "Señalización de equipos contra incendio visible y correcta",
              "Luces de emergencia operativas",
              "Salidas de emergencia señalizadas y despejadas",
              "Puertas de salida abren en sentido de evacuación",
              "Sistema de detección de incendios operativo (si aplica)",
              "Alarmas sonoras y visuales operativas",
              "Rociadores automáticos operativos (si aplica)",
              "Tablero de control de incendios operativo (si aplica)",
              "Puertas cortafuego sin obstáculos y cerrando correctamente",
              "Carga de fuego dentro de los límites permitidos",
              "Materiales combustibles almacenados de forma segura",
              "Plan de evacuación visible y actualizado",
              "Personal conoce el plan de evacuación",
            ],
          },
          signaling: {
            name: "Checklist de Señalización",
            items: [
              "Las señales de seguridad están presentes en todas las áreas requeridas",
              "La señalización es visible y está ubicada en lugares estratégicos",
              "Las señales son legibles y comprensibles",
              "El tamaño de las señales es adecuado para su visualización",
              "Los colores y símbolos cumplen con la normativa vigente",
              "Las señales de advertencia están correctamente identificadas",
              "Las señales de prohibición están correctamente identificadas",
              "Las señales de obligación están correctamente identificadas",
              "Las señales de emergencia / evacuación están correctamente identificadas",
              "Las señales están en buen estado (sin daños, decoloración o desgaste)",
              "La señalización se encuentra fijada correctamente",
              "Se cuenta con planos o croquis con la identificación de la señalización",
              "Las señales se actualizan ante cambios en condiciones o procesos",
              "Personal conoce el significado de las señales",
              "Señalización de riesgos específicos (eléctrico, químico, etc.)",
              "Señalización de lugares de almacenamiento de sustancias peligrosas",
              "Señalización de áreas de uso restringido",
              "Señalización de extintores y equipos de emergencia",
              "Señalización de salidas de emergencia",
              "Líneas de seguridad demarcadas en pisos cuando corresponda",
            ],
          },
          epp: {
            name: "Checklist de EPP (Equipo de Protección Personal)",
            items: [
              "El personal utiliza EPP de acuerdo al riesgo de la tarea",
              "Casco de seguridad en buen estado y correctamente colocado",
              "Protección ocular / facial utilizada cuando corresponde",
              "Protección auditiva utilizada cuando corresponde",
              "Protección respiratoria utilizada cuando corresponde",
              "Guantes adecuados al tipo de tarea y en buen estado",
              "Calzado de seguridad en buen estado y utilizado",
              "Ropa de trabajo adecuada y utilizada",
              "Arnés de seguridad en trabajos en altura",
              "Elementos de sujeción y líneas de vida en buen estado",
              "EPP limpio, desinfectado y correctamente mantenido",
              "Reemplazo de EPP deteriorado o vencido",
              "Almacenamiento adecuado del EPP",
              "El personal utiliza siempre el EPP requerido",
              "Capacitación del personal sobre uso correcto de EPP",
              "Supervisión del uso correcto de EPP",
              "Registros de entrega de EPP disponibles",
              "EPP específico por tarea y puesto de trabajo",
              "Uso obligatorio de EPP visible y cumplido",
              "Presupuesto y gestión de EPP implementada",
            ],
          },
          deposits: {
            name: "Checklist de Depósitos",
            items: [
              "Las áreas de depósito están limpias, ordenadas y libres de obstáculos",
              "Pasillos y salidas de emergencia despejados y señalizados",
              "Las estanterías y rack están en buen estado y ancladas",
              "Las cargas almacenadas están estables y seguras",
              "Respeto de alturas máximas de apilamiento",
              "Los materiales pesados se almacenan en niveles bajos",
              "Correcta distribución y separación de cargas",
              "Productos químicos almacenados según normativa",
              "Sustancias inflamables en recipientes adecuados y señalizados",
              "Ventilación adecuada en áreas de almacenamiento",
              "Control de temperatura y humedad (si aplica)",
              "Iluminación adecuada en todo el depósito",
              "Extintores accesibles, vigentes y señalizados",
              "Detectores de humo / incendio operativos (si aplica)",
              "Señalización de riesgos y advertencias visible",
              "Elementos de protección de estanterías y columnas",
              "Pallets y embalajes en buen estado",
              "No hay materiales en contacto directo con el suelo",
              "Equipos de manipulación (montacargas, etc.) en buen estado",
              "Procedimientos de carga y descarga establecidos y conocidos",
            ],
          },
        };

        useEffect(() => {
          const saved = localStorage.getItem("checklistData");
          if (saved) {
            const data = JSON.parse(saved);
            setClientData(data.clientData);
            setChecklistItems(data.checklistItems);
            setObservations(data.observations);
            setSelectedChecklist(data.selectedChecklist || "general");
          }
        }, []);

        useEffect(() => {
          localStorage.setItem(
            "checklistData",
            JSON.stringify({
              clientData,
              checklistItems,
              observations,
              selectedChecklist,
            }),
          );
        }, [clientData, checklistItems, observations, selectedChecklist]);

        const handleClientDataChange = (field, value) => {
          setClientData((prev) => ({ ...prev, [field]: value }));
        };

        const handleChecklistItemChange = (index, value) => {
          const currentList = checklistItems[selectedChecklist] || {};
          setChecklistItems((prev) => ({
            ...prev,
            [selectedChecklist]: { ...currentList, [index]: value },
          }));
        };

        const generatePDF = () => {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF("l", "mm", "a4"); // landscape

          let yPosition = 15;

          // Título
          doc.setFontSize(18);
          doc.setTextColor(30, 64, 175); // Azul
          doc.text("CHECKLIST DE INSPECCIÓN - HIGIENE Y SEGURIDAD", 148, yPosition, {
            align: "center",
          });
          yPosition += 8;

          doc.setFontSize(10);
          doc.setTextColor(100, 100, 100);
          doc.text("Reporte de Inspección", 148, yPosition, {
            align: "center",
          });
          yPosition += 12;

          // Línea separadora
          doc.setDrawColor(30, 64, 175);
          doc.setLineWidth(0.5);
          doc.line(10, yPosition - 2, 286, yPosition - 2);
          yPosition += 5;

          // Datos del cliente
          doc.setFontSize(10);
          doc.setTextColor(30, 64, 175);
          doc.text("DATOS DEL CLIENTE", 10, yPosition);
          yPosition += 6;

          doc.setFontSize(9);
          doc.setTextColor(0, 0, 0);
          doc.text(
            `Empresa: ${clientData.company || "N/A"} | CUIT: ${clientData.cuit || "N/A"} | Fecha: ${clientData.visitDate || "N/A"} | Inspector: ${clientData.inspector || "N/A"}`,
            10,
            yPosition,
          );
          yPosition += 5;
          doc.text(
            `Domicilio: ${clientData.address || "N/A"} | Teléfono: ${clientData.phone || "N/A"} | Email: ${clientData.email || "N/A"} | Sector: ${clientData.sector || "N/A"}`,
            10,
            yPosition,
          );
          yPosition += 8;

          // Nombre del checklist
          doc.setFontSize(10);
          doc.setTextColor(30, 64, 175);
          doc.text(
            `CHECKLIST: ${checklists[selectedChecklist].name}`,
            10,
            yPosition,
          );
          yPosition += 8;

          // Preparar datos para la tabla
          const tableData = checklists[selectedChecklist].items.map(
            (item, index) => {
              const status =
                checklistItems[selectedChecklist]?.[index] || "pending";
              let statusText = "N/A";

              if (status === "yes") {
                statusText = "SÍ";
              } else if (status === "no") {
                statusText = "NO";
              }

              return [(index + 1).toString(), item, statusText];
            },
          );

          // Generar tabla
          doc.autoTable({
            head: [["N°", "ITEM DE INSPECCIÓN", "ESTADO"]],
            body: tableData,
            startY: yPosition,
            margin: { left: 10, right: 10 },
            columnStyles: {
              0: { cellWidth: 15, halign: "center", fontStyle: "bold" },
              1: { cellWidth: 240, halign: "left" },
              2: {
                cellWidth: 25,
                halign: "center",
                fontStyle: "bold",
                fontSize: 11,
              },
            },
            headStyles: {
              fillColor: [30, 64, 175],
              textColor: [255, 255, 255],
              fontStyle: "bold",
              fontSize: 10,
              halign: "center",
              cellPadding: 5,
            },
            bodyStyles: {
              fontSize: 9,
              cellPadding: 4,
              lineColor: [51, 51, 51],
              fillColor: [255, 255, 255],
            },
            didParseCell: (data) => {
              // Colorear solo el texto de la columna ESTADO (index 2)
              if (data.section === "body" && data.column.index === 2) {
                const statusText = data.cell.raw;

                if (statusText === "SÍ") {
                  data.cell.styles.textColor = [76, 175, 80]; // Verde
                } else if (statusText === "NO") {
                  data.cell.styles.textColor = [244, 67, 54]; // Rojo
                } else if (statusText === "N/A") {
                  data.cell.styles.textColor = [255, 152, 0]; // Naranja
                }
                data.cell.styles.fontStyle = "bold";
                data.cell.styles.fontSize = 10;
              }
            },
            pageBreak: "auto",
          });

          // Si hay observaciones, agregarlas en una nueva página si es necesario
          if (observations) {
            let finalY = doc.lastAutoTable.finalY + 10;

            if (finalY > 240) {
              doc.addPage();
              finalY = 15;
            }

            doc.setFontSize(11);
            doc.setTextColor(220, 38, 38); // Rojo
            doc.setFont(undefined, "bold");
            doc.text("OBSERVACIONES", 10, finalY);
            doc.setFont(undefined, "normal");
            finalY += 8;

            doc.setFontSize(9);
            doc.setTextColor(0, 0, 0);
            const obsLines = doc.splitTextToSize(observations, 276);
            doc.text(obsLines, 10, finalY);
          }

          // Pie de página en cada página con leyenda mejorada
          const pageCount = doc.internal.pages.length - 1;
          for (let i = 1; i <= pageCount; i++) {
            doc.setPage(i);
            doc.setFontSize(8);
            doc.setTextColor(100, 100, 100);

            const pageHeight = doc.internal.pageSize.getHeight();
            const bottomY = pageHeight - 10;

            // Leyenda mejorada
            doc.text("Leyenda de Estados:", 10, bottomY);
            doc.text(
              "SÍ = Cumple | NO = No Cumple | N/A = No Aplica",
              10,
              bottomY + 4,
            );
            doc.text(
              `Reporte generado el ${new Date().toLocaleDateString("es-AR")} a las ${new Date().toLocaleTimeString("es-AR")}`,
              148,
              bottomY + 4,
              { align: "center" },
            );
          }

          doc.save(
            `checklist-${clientData.company || "reporte"}-${clientData.visitDate}.pdf`,
          );
        };

        const currentItems = checklists[selectedChecklist].items;
        const currentChecks = checklistItems[selectedChecklist] || {};

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
            <div className="max-w-4xl mx-auto">
              <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                <div className="mb-4">
                  <h1 className="text-3xl font-bold text-indigo-600">
                    MEGA PACK
                  </h1>
                  <p className="text-gray-600">
                    Higiene y Seguridad - Aplicación de Checklists
                  </p>
                </div>

                <div className="flex gap-2 border-b border-gray-200 mb-6">
                  <button
                    onClick={() => setActiveTab("client-info")}
                    className={`px-4 py-2 font-medium border-b-2 transition ${
                      activeTab === "client-info"
                        ? "border-indigo-600 text-indigo-600"
                        : "border-transparent text-gray-600 hover:text-gray-800"
                    }`}
                  >
                    Datos del Cliente
                  </button>
                  <button
                    onClick={() => setActiveTab("checklist")}
                    className={`px-4 py-2 font-medium border-b-2 transition ${
                      activeTab === "checklist"
                        ? "border-indigo-600 text-indigo-600"
                        : "border-transparent text-gray-600 hover:text-gray-800"
                    }`}
                  >
                    Checklist
                  </button>
                </div>
              </div>

              <div className="bg-white rounded-lg shadow-lg p-6">
                {activeTab === "client-info" && (
                  <div className="space-y-4">
                    <h2 className="text-xl font-bold text-gray-800 mb-4">
                      Información del Cliente
                    </h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {[
                        { key: "company", label: "Empresa" },
                        { key: "cuit", label: "CUIT" },
                        { key: "address", label: "Domicilio" },
                        { key: "phone", label: "Teléfono" },
                        { key: "email", label: "Email" },
                        { key: "sector", label: "Sector/Área" },
                        { key: "workers", label: "Cantidad de trabajadores" },
                        {
                          key: "visitDate",
                          label: "Fecha de visita",
                          type: "date",
                        },
                        {
                          key: "inspector",
                          label: "Inspector/Profesional",
                          md: "md:col-span-2",
                        },
                      ].map((field) => (
                        <div key={field.key} className={field.md || ""}>
                          <label className="block text-sm font-medium text-gray-700 mb-1">
                            {field.label}
                          </label>
                          <input
                            type={field.type || "text"}
                            value={clientData[field.key]}
                            onChange={(e) =>
                              handleClientDataChange(field.key, e.target.value)
                            }
                            className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === "checklist" && (
                  <div className="space-y-4">
                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                      <p className="text-sm text-blue-800 font-medium">
                        💡 Selecciona un checklist, completa los items y
                        descarga el PDF al final.
                      </p>
                    </div>

                    <div className="mb-6">
                      <label className="block text-sm font-medium text-gray-700 mb-2">
                        Seleccionar Checklist
                      </label>
                      <select
                        value={selectedChecklist}
                        onChange={(e) => setSelectedChecklist(e.target.value)}
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                      >
                        {Object.entries(checklists).map(([key, value]) => (
                          <option key={key} value={key}>
                            {value.name}
                          </option>
                        ))}
                      </select>
                    </div>

                    <h2 className="text-xl font-bold text-gray-800 mb-4">
                      {checklists[selectedChecklist].name}
                    </h2>

                    <div className="space-y-2 max-h-96 overflow-y-auto border border-gray-200 rounded p-4">
                      {currentItems.map((item, index) => (
                        <div
                          key={index}
                          className="flex items-start gap-3 p-2 hover:bg-gray-50 rounded"
                        >
                          <div className="flex gap-1 flex-shrink-0">
                            <button
                              onClick={() =>
                                handleChecklistItemChange(index, "yes")
                              }
                              className={`px-2 py-1 rounded text-sm font-medium transition ${
                                currentChecks[index] === "yes"
                                  ? "bg-green-500 text-white"
                                  : "bg-gray-200 text-gray-700 hover:bg-green-200"
                              }`}
                            >
                              ✅
                            </button>
                            <button
                              onClick={() =>
                                handleChecklistItemChange(index, "no")
                              }
                              className={`px-2 py-1 rounded text-sm font-medium transition ${
                                currentChecks[index] === "no"
                                  ? "bg-red-500 text-white"
                                  : "bg-gray-200 text-gray-700 hover:bg-red-200"
                              }`}
                            >
                              ❌
                            </button>
                            <button
                              onClick={() =>
                                handleChecklistItemChange(index, "pending")
                              }
                              className={`px-2 py-1 rounded text-sm font-medium transition ${
                                currentChecks[index] === "pending" ||
                                !currentChecks[index]
                                  ? "bg-yellow-500 text-white"
                                  : "bg-gray-200 text-gray-700 hover:bg-yellow-200"
                              }`}
                            >
                              ⏳
                            </button>
                          </div>
                          <span className="text-gray-700 text-sm flex-1">
                            {item}
                          </span>
                        </div>
                      ))}
                    </div>

                    <div className="mt-6">
                      <label className="block text-sm font-medium text-gray-700 mb-2">
                        Observaciones
                      </label>
                      <textarea
                        value={observations}
                        onChange={(e) => setObservations(e.target.value)}
                        rows="4"
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                        placeholder="Escriba observaciones adicionales..."
                      />
                    </div>
                  </div>
                )}
              </div>

              {activeTab === "checklist" && (
                <div className="mt-8 flex gap-4 justify-center flex-wrap border-t pt-6">
                  <button
                    onClick={generatePDF}
                    className="px-8 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-bold text-lg shadow-lg"
                  >
                    📥 Descargar PDF de esta sección
                  </button>
                </div>
              )}

              {activeTab === "client-info" && (
                <div className="mt-6 flex gap-4 justify-center flex-wrap">
                  <p className="text-sm text-gray-600 w-full text-center">
                    💡 Los datos se guardan automáticamente
                  </p>
                </div>
              )}

              <div className="mt-6 flex gap-4 justify-center flex-wrap">
                <button
                  onClick={() => {
                    if (
                      confirm("¿Estás seguro? Se borrarán todos los datos.")
                    ) {
                      localStorage.clear();
                      setClientData({
                        company: "",
                        cuit: "",
                        address: "",
                        phone: "",
                        email: "",
                        sector: "",
                        workers: "",
                        visitDate: new Date().toISOString().split("T")[0],
                        inspector: "",
                      });
                      setChecklistItems({});
                      setObservations("");
                      alert("Datos borrados correctamente");
                    }
                  }}
                  className="px-6 py-2 bg-gray-400 text-white rounded-lg hover:bg-gray-500 transition font-medium"
                >
                  🗑️ Limpiar Todo
                </button>
              </div>
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<ChecklistApp />);
    </script>
  </body>
</html>
